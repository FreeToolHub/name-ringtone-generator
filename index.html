<!DOCTYPE html>
<html>
<head>
<title>Name Ringtone Generator</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  text-align: center;
  background: #0f172a;
  color: white;
}
.container {
  margin-top: 50px;
}
input {
  padding: 12px;
  width: 250px;
  border-radius: 8px;
  border: none;
}
button {
  padding: 12px 20px;
  margin-top: 10px;
  background: #22c55e;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
audio {
  margin-top: 20px;
}
</style>
</head>

<body>

<h1>🔥 Name Ringtone Generator</h1>

<div class="container">
  <input type="text" id="name" placeholder="Enter your name">
  <br>
  <button onclick="generate()">Generate Ringtone</button>

  <div id="result"></div>
</div>

<script>
async function generate() {
  let name = document.getElementById("name").value;

  if(name === "") {
    alert("Enter name first!");
    return;
  }

  let text = name + " calling ringtone";
  let apiKey = "YOUR_API_KEY";

  let voiceUrl = "https://api.voicerss.org/?key=" + apiKey + "&hl=en-in&src=" + encodeURIComponent(text) + "&c=MP3";

  let musicUrl = "music.mp3";

  const audioContext = new (window.AudioContext || window.webkitAudioContext)();

  async function loadAudio(url) {
    const res = await fetch(url);
    const arrayBuffer = await res.arrayBuffer();
    return await audioContext.decodeAudioData(arrayBuffer);
  }

  let voiceBuffer = await loadAudio(voiceUrl);
  let musicBuffer = await loadAudio(musicUrl);

  let output = audioContext.createBuffer(
    2,
    voiceBuffer.length,
    audioContext.sampleRate
  );

  for (let channel = 0; channel < 2; channel++) {
    let outputData = output.getChannelData(channel);
    let voiceData = voiceBuffer.getChannelData(0);
    let musicData = musicBuffer.getChannelData(0);

    for (let i = 0; i < voiceData.length; i++) {
      outputData[i] = voiceData[i] + (musicData[i] * 0.3);
    }
  }

  let source = audioContext.createBufferSource();
  source.buffer = output;

  let dest = audioContext.createMediaStreamDestination();
  source.connect(dest);
  source.start();

  let recorder = new MediaRecorder(dest.stream);
  let chunks = [];

  recorder.ondataavailable = e => chunks.push(e.data);

  recorder.onstop = () => {
    let blob = new Blob(chunks, { type: "audio/mp3" });
    let url = URL.createObjectURL(blob);

    document.getElementById("result").innerHTML = `
      <audio controls src="${url}"></audio><br>
      <a href="${url}" download="${name}-ringtone.mp3">Download</a>
    `;
  };

  recorder.start();
  setTimeout(() => recorder.stop(), 4000);
}
</script>

</body>
</html>
