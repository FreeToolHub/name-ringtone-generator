<body style="font-family:sans-serif; text-align:center; padding:20px;">

  <h1>📱 Name Ringtone Generator</h1>

  <input type="text" id="name" placeholder="Enter your name" style="padding:10px; width:200px;">
  <br><br>

  <button onclick="generate()">Generate Ringtone</button>

  <h3 id="output"></h3>

  <button onclick="play()">▶ Play</button>

  <!-- Download -->
  <br><br>
  <button onclick="download()">⬇ Download</button>

  <!-- TTS Script -->
  <script src="https://code.responsivevoice.org/responsivevoice.js"></script>

  <script>
    let text = "";

    function generate() {
      let name = document.getElementById("name").value;
      text = name + " is calling you, please pick up the phone";
      document.getElementById("output").innerText = text;
    }

    function play() {
      responsiveVoice.speak(text);
    }

    function download() {
      alert("Download feature requires backend. Use screen recorder or advanced version later.");
    }
  </script>

</body>
</html>
