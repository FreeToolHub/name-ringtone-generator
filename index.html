<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Name Ringtone Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

input {
  width: 90%;
  max-width: 300px;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: none;
}

button {
  width: 90%;
  max-width: 300px;
  padding: 12px;
  margin: 8px 0;
  background: orange;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

audio {
  width: 90%;
  margin-top: 10px;
}

#status {
  margin-top: 10px;
  color: lightgreen;
}
</style>
</head>

<body>

<div class="container">
  <h1>📞 Name Ringtone Generator</h1>

  <input type="text" id="nameInput" placeholder="Apna naam likho...">

  <button onclick="generate()">🎵 Generate</button>

  <audio id="player" controls></audio>

  <p id="status"></p>

  <button onclick="download()">⬇ Download</button>

  <!-- Ads -->
  <div id="ads">
    <!-- Adsterra script yaha paste karo -->
  </div>

</div>

<script>

let audioBlob = null;

async function generate() {
  const name = document.getElementById("nameInput").value.trim();
  const status = document.getElementById("status");
  const player = document.getElementById("player");

  if (!name) {
    alert("Naam likho!");
    return;
  }

  status.innerText = "⏳ Ringtone generate ho rahi hai...";

  const text = `${name} ji, phone utha lo, koi call kar raha hai`;

  const url = "https://api.streamelements.com/kappa/v2/speech?voice=Brian&text=" + encodeURIComponent(text);

  try {
    const response = await fetch(url);
    const blob = await response.blob();

    audioBlob = blob;

    const audioURL = URL.createObjectURL(blob);
    player.src = audioURL;

    player.play();

    status.innerText = "✅ Ready! Play ya download karo";

  } catch (error) {
    status.innerText = "❌ Error: Internet ya browser issue";
  }
}

function download() {
  if (!audioBlob) {
    alert("Pehle generate karo!");
    return;
  }

  const url = URL.createObjectURL(audioBlob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "ringtone.mp3";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

</script>

</body>
</html>
