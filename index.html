<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Ringtone Generator | Working Version</title>
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; --dark: #1e1b4b; --success: #22c55e; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); text-align: center; margin-top: 20px; }
        h1 { margin-bottom: 10px; color: var(--dark); font-size: 1.6rem; }
        .subtitle { color: #64748b; margin-bottom: 25px; font-size: 0.9rem; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #e2e8f0; border-radius: 12px; margin-bottom: 20px; font-size: 1rem; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 12px; font-size: 1rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-generate { background: var(--primary); color: white; }
        .btn-generate:disabled { background: #cbd5e1; cursor: not-allowed; }
        .result-area { display: none; margin-top: 25px; border-top: 2px solid #f1f5f9; padding-top: 25px; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ad-slot { background: #f8fafc; border: 1px dashed #cbd5e1; margin: 10px 0; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 12px; border-radius: 8px; }
        .ad-top { height: 90px; width: 100%; max-width: 728px; }
    </style>
</head>
<body>

    <!-- Ad Slot Top -->
    <div class="ad-slot ad-top">ADVERTISEMENT - TOP BANNER</div>

    <div class="container">
        <h1>Name Ringtone Maker</h1>
        <p class="subtitle">Create & Download Personal Ringtones</p>
        
        <input type="text" id="userName" placeholder="Type your name here..." maxlength="30">
        
        <button id="generateBtn" class="btn btn-generate">
            <span id="btnText">Create Ringtone</span>
        </button>

        <!-- Ad Slot Middle -->
        <div class="ad-slot" style="height: 100px;">ADVERTISEMENT - CONTENT AD</div>

        <div id="resultArea" class="result-area">
            <p style="margin-bottom: 15px; font-weight: bold; color: var(--success);">🎉 Your ringtone is ready!</p>
            <button id="playBtn" class="btn" style="background: var(--dark); color: white;">▶ Play Now</button>
            <button id="downloadBtn" class="btn" style="background: var(--success); color: white;">↓ Download (WAV)</button>
        </div>
    </div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const btnText = document.getElementById('btnText');
        const resultArea = document.getElementById('resultArea');
        const userNameInput = document.getElementById('userName');
        
        let finalBlob = null;
        const BG_URL = 'https://files.catbox.moe/66alqw.mp3';

        generateBtn.onclick = async () => {
            const name = userNameInput.value.trim();
            if (!name) return alert("Please enter your name!");

            // UI Reset
            generateBtn.disabled = true;
            btnText.innerText = "Processing... (Speak permission may be needed)";
            resultArea.style.display = 'none';

            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // 1. Fetch Music Buffer
                const response = await fetch(BG_URL);
                const arrayBuffer = await response.arrayBuffer();
                const bgBuffer = await audioCtx.decodeAudioData(arrayBuffer);

                // 2. Setup Recording Destination
                const dest = audioCtx.createMediaStreamDestination();
                const recorder = new MediaRecorder(dest.stream);
                const chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    finalBlob = new Blob(chunks, { type: 'audio/wav' });
                    btnText.innerText = "Create Ringtone";
                    generateBtn.disabled = false;
                    resultArea.style.display = 'block';
                };

                // 3. Prepare Background Music Source
                const bgSource = audioCtx.createBufferSource();
                bgSource.buffer = bgBuffer;
                const bgGain = audioCtx.createGain();
                bgGain.gain.value = 0.3; // Music volume low
                bgSource.connect(bgGain);
                bgGain.connect(dest);
                bgGain.connect(audioCtx.destination); // Play while recording so it's captured

                // 4. Prepare Speech
                const speechText = `${name}, someone is calling you please pick up the phone`;
                const utterance = new SpeechSynthesisUtterance(speechText);
                
                // Indian English Voice Set Karein
                const voices = window.speechSynthesis.getVoices();
                utterance.voice = voices.find(v => v.lang.includes('en-IN')) || voices[0];
                utterance.rate = 0.85;

                // 5. Start Recording & Audio
                recorder.start();
                bgSource.start(0);
                window.speechSynthesis.speak(utterance);

                utterance.onend = () => {
                    // Speech khatam hone ke 1 sec baad music stop karein
                    setTimeout(() => {
                        bgSource.stop();
                        recorder.stop();
                        audioCtx.close();
                    }, 1000);
                };

            } catch (err) {
                console.error(err);
                alert("Something went wrong. Please use Google Chrome.");
                generateBtn.disabled = false;
                btnText.innerText = "Create Ringtone";
            }
        };

        document.getElementById('playBtn').onclick = () => {
            if (finalBlob) {
                const audio = new Audio(URL.createObjectURL(finalBlob));
                audio.play();
            }
        };

        document.getElementById('downloadBtn').onclick = () => {
            if (finalBlob) {
                const url = URL.createObjectURL(finalBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${userNameInput.value}_Ringtone.wav`;
                a.click();
            }
        };

        // Pre-load voices
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
