<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Name Ringtone Generator 🔥</title>

<style>
body{
    background:#0f172a;
    color:white;
    text-align:center;
    font-family:system-ui;
}
.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}
input,button{
    width:100%;
    padding:14px;
    margin-top:12px;
    border-radius:10px;
    border:none;
}
button{
    background:#22c55e;
    color:white;
}
audio{
    width:100%;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<h2>🔥 Name Ringtone Generator</h2>

<input type="text" id="name" placeholder="Enter Name">

<button onclick="generate()">Generate</button>
<button onclick="download()">Download</button>

<audio id="player" controls></audio>

</div>

<script>

let finalBlob = null;

async function generate(){

    const name = document.getElementById("name").value.trim();
    if(!name) return alert("Enter name");

    const text = `${name}, someone is calling you, please pick up the phone`;

    // 🔥 GOOGLE TTS API
    const apiKey = "AIzaSyC0rUAmVcsyLCvEdCGHJQ733gs5uhRjPZM";

    const res = await fetch(`https://texttospeech.googleapis.com/v1/text:synthesize?key=${apiKey}`,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            input:{text:text},
            voice:{languageCode:"en-IN", name:"en-IN-Wavenet-B"},
            audioConfig:{audioEncoding:"MP3"}
        })
    });

    const data = await res.json();

    const voiceBase64 = data.audioContent;
    const voiceBlob = base64ToBlob(voiceBase64, "audio/mp3");

    // 🎵 LOAD MUSIC
    const music = await fetch("https://files.catbox.moe/66alqw.mp3");
    const musicBlob = await music.blob();

    // 🎧 MERGE USING AUDIO CONTEXT
    const audioContext = new AudioContext();

    const voiceBuffer = await audioContext.decodeAudioData(await voiceBlob.arrayBuffer());
    const musicBuffer = await audioContext.decodeAudioData(await musicBlob.arrayBuffer());

    const duration = Math.max(voiceBuffer.duration, musicBuffer.duration);

    const offline = new OfflineAudioContext(1, 44100 * duration, 44100);

    const voiceSource = offline.createBufferSource();
    voiceSource.buffer = voiceBuffer;

    const musicSource = offline.createBufferSource();
    musicSource.buffer = musicBuffer;

    const musicGain = offline.createGain();
    musicGain.gain.value = 0.3;

    voiceSource.connect(offline.destination);
    musicSource.connect(musicGain).connect(offline.destination);

    voiceSource.start(0);
    musicSource.start(0);

    const rendered = await offline.startRendering();

    const wavBlob = bufferToWav(rendered);

    finalBlob = wavBlob;

    const url = URL.createObjectURL(wavBlob);
    document.getElementById("player").src = url;
}

function download(){
    if(!finalBlob) return alert("Generate first");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(finalBlob);
    a.download = "ringtone.wav";
    a.click();
}

// 🔧 HELPERS
function base64ToBlob(base64, type){
    const byteChars = atob(base64);
    const byteNumbers = new Array(byteChars.length);
    for(let i=0;i<byteChars.length;i++){
        byteNumbers[i] = byteChars.charCodeAt(i);
    }
    return new Blob([new Uint8Array(byteNumbers)], {type:type});
}

function bufferToWav(buffer){
    const numOfChan = buffer.numberOfChannels,
    length = buffer.length * numOfChan * 2 + 44,
    bufferArray = new ArrayBuffer(length),
    view = new DataView(bufferArray);

    let offset = 0;

    function writeString(str){
        for (let i = 0; i < str.length; i++){
            view.setUint8(offset++, str.charCodeAt(i));
        }
    }

    writeString("RIFF");
    view.setUint32(offset, 36 + buffer.length * 2, true); offset += 4;
    writeString("WAVE");
    writeString("fmt ");
    view.setUint32(offset, 16, true); offset += 4;
    view.setUint16(offset, 1, true); offset += 2;
    view.setUint16(offset, numOfChan, true); offset += 2;
    view.setUint32(offset, buffer.sampleRate, true); offset += 4;
    view.setUint32(offset, buffer.sampleRate * 2, true); offset += 4;
    view.setUint16(offset, numOfChan * 2, true); offset += 2;
    view.setUint16(offset, 16, true); offset += 2;
    writeString("data");
    view.setUint32(offset, buffer.length * 2, true); offset += 4;

    const channelData = buffer.getChannelData(0);
    for (let i = 0; i < channelData.length; i++, offset += 2){
        const s = Math.max(-1, Math.min(1, channelData[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }

    return new Blob([view], { type: "audio/wav" });
}

</script>

</body>
</html>
