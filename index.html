<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Name Ringtone Generator</title>

<!-- SEO -->
<meta name="description" content="Generate custom name ringtone like 'Vishal calling ringtone' instantly. Free download.">

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #121212);
    color: white;
    text-align: center;
    margin: 0;
}

.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
}

h1 {
    font-size: 26px;
}

input {
    width: 90%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 15px;
    font-size: 16px;
}

button {
    padding: 12px 20px;
    margin: 10px;
    border: none;
    border-radius: 10px;
    background: #ff4757;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #ff6b81;
}

/* Ad sections */
.ad-top, .ad-bottom {
    margin: 15px 0;
    background: #2a2a3d;
    padding: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

    <h1>🔥 Name Ringtone Generator</h1>

    <!-- TOP AD -->
    <div class="ad-top">
        <!-- Google AdSense Code -->
        YOUR_AD_CODE_HERE
    </div>

    <input type="text" id="name" placeholder="Enter your name">

    <br>

    <button onclick="generate()">🎧 Generate</button>
    <button onclick="download()">⬇ Download</button>

    <audio id="voiceAudio"></audio>
    <audio id="musicAudio" src="https://files.catbox.moe/66alqw.mp3" loop></audio>

    <!-- BOTTOM AD -->
    <div class="ad-bottom">
        YOUR_AD_CODE_HERE
    </div>

</div>

<script>

let voiceURL = "";

function generate() {
    let name = document.getElementById("name").value.trim();

    if (!name) {
        alert("Enter name first!");
        return;
    }

    let text = name + " someone is calling you please pickup the phone";

    voiceURL = `https://api.voicerss.org/?key=ec7c59370d864b21ad1d0c68f7e2b58c&hl=en-in&src=${encodeURIComponent(text)}`;

    let voice = document.getElementById("voiceAudio");
    let music = document.getElementById("musicAudio");

    voice.src = voiceURL;

    // Play both together
    voice.play();
    music.currentTime = 0;
    music.volume = 0.3;
    music.play();
}

async function download() {
    if (!voiceURL) {
        alert("Generate ringtone first!");
        return;
    }

    const ctx = new AudioContext();

    const voiceBuffer = await fetch(voiceURL)
        .then(r => r.arrayBuffer())
        .then(data => ctx.decodeAudioData(data));

    const musicBuffer = await fetch("https://files.catbox.moe/66alqw.mp3")
        .then(r => r.arrayBuffer())
        .then(data => ctx.decodeAudioData(data));

    const length = Math.max(voiceBuffer.length, musicBuffer.length);

    const output = ctx.createBuffer(2, length, ctx.sampleRate);

    for (let channel = 0; channel < 2; channel++) {
        let outputData = output.getChannelData(channel);
        let voiceData = voiceBuffer.getChannelData(channel % voiceBuffer.numberOfChannels);
        let musicData = musicBuffer.getChannelData(channel % musicBuffer.numberOfChannels);

        for (let i = 0; i < length; i++) {
            let v = voiceData[i] || 0;
            let m = musicData[i] || 0;

            outputData[i] = v + (m * 0.3);
        }
    }

    const wav = bufferToWave(output, output.length);
    const blob = new Blob([wav], { type: 'audio/wav' });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "ringtone.wav";
    a.click();
}

// Convert buffer to WAV
function bufferToWave(abuffer, len) {
    let numOfChan = abuffer.numberOfChannels,
        length = len * numOfChan * 2 + 44,
        buffer = new ArrayBuffer(length),
        view = new DataView(buffer),
        channels = [],
        i, sample,
        offset = 0,
        pos = 0;

    setUint32(0x46464952);
    setUint32(length - 8);
    setUint32(0x45564157);

    setUint32(0x20746d66);
    setUint32(16);
    setUint16(1);
    setUint16(numOfChan);
    setUint32(abuffer.sampleRate);
    setUint32(abuffer.sampleRate * 2 * numOfChan);
    setUint16(numOfChan * 2);
    setUint16(16);

    setUint32(0x61746164);
    setUint32(length - pos - 4);

    for (i = 0; i < abuffer.numberOfChannels; i++)
        channels.push(abuffer.getChannelData(i));

    while (pos < length) {
        for (i = 0; i < numOfChan; i++) {
            sample = Math.max(-1, Math.min(1, channels[i][offset]));
            sample = (sample * 32767) | 0;
            view.setInt16(pos, sample, true);
            pos += 2;
        }
        offset++;
    }

    return buffer;

    function setUint16(data) {
        view.setUint16(pos, data, true);
        pos += 2;
    }

    function setUint32(data) {
        view.setUint32(pos, data, true);
        pos += 4;
    }
}

</script>

</body>
</html>
