<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Name Ringtone Generator</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SEO -->
<meta name="description" content="Create your name ringtone instantly. Download your custom caller name ringtone free.">
<meta name="keywords" content="name ringtone download, caller name ringtone, ringtone maker india">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.container {
  text-align: center;
  padding: 20px;
}

h1 {
  font-size: 22px;
}

input {
  width: 90%;
  max-width: 300px;
  padding: 12px;
  margin-top: 15px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button {
  width: 90%;
  max-width: 300px;
  padding: 12px;
  margin-top: 10px;
  background: orange;
  border: none;
  border-radius: 8px;
  font-size: 16px;
}

audio {
  margin-top: 15px;
  width: 90%;
  max-width: 300px;
}

#status {
  margin-top: 10px;
  color: lightgreen;
}
</style>

</head>

<body>

<div class="container">

<h1>📞 Name Ringtone Generator</h1>

<input type="text" id="nameInput" placeholder="Apna naam likho">

<button onclick="generate()">🎵 Generate</button>

<audio id="player" controls></audio>

<button onclick="download()">⬇ Download MP3</button>

<p id="status"></p>

<!-- Adsterra Ad Space -->
<div>
<!-- Ad code yaha paste karna -->
</div>

</div>

<script>

let audioBlobURL = "";

async function generate() {

  const name = document.getElementById("nameInput").value.trim();
  const status = document.getElementById("status");
  const player = document.getElementById("player");

  if (!name) {
    alert("Naam likho!");
    return;
  }

  const text = `${name} ji, phone utha lo, koi call kar raha hai`;

  const url = "https://translate.google.com/translate_tts?ie=UTF-8&q="
              + encodeURIComponent(text)
              + "&tl=hi&client=tw-ob";

  try {

    status.innerText = "⏳ Generating...";

    const response = await fetch(url, {
      method: "GET",
      headers: {
        "Accept": "audio/mpeg"
      }
    });

    const blob = await response.blob();
    audioBlobURL = URL.createObjectURL(blob);

    player.src = audioBlobURL;
    player.play();

    status.innerText = "✅ Ringtone ready!";

  } catch (err) {
    status.innerText = "❌ Error: Browser blocked audio";
    console.error(err);
  }
}

function download() {

  if (!audioBlobURL) {
    alert("Pehle generate karo!");
    return;
  }

  const a = document.createElement("a");
  a.href = audioBlobURL;
  a.download = "ringtone.mp3";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

</script>

</body>
</html>
