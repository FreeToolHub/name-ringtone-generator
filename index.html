<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Name Ringtone Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
  text-align: center;
}

.container {
  padding: 20px;
}

input {
  width: 90%;
  max-width: 300px;
  padding: 12px;
  border-radius: 8px;
  border: none;
}

button {
  width: 90%;
  max-width: 300px;
  padding: 12px;
  margin: 10px 0;
  background: orange;
  border: none;
  border-radius: 8px;
}

audio {
  margin-top: 15px;
  width: 90%;
  max-width: 300px;
}

#status {
  margin-top: 10px;
  color: lightgreen;
}
</style>

</head>

<body>

<div class="container">

<h1>📞 Name Ringtone Generator</h1>

<input type="text" id="nameInput" placeholder="Apna naam likho...">

<button onclick="generateRingtone()">🎵 Generate</button>

<p id="status"></p>

<audio id="player" controls></audio>

<button onclick="downloadRingtone()">⬇ Download</button>

<div class="ad-box">
  <!-- Adsterra code yaha -->
</div>

</div>

<script>

let audioURL = "";
let player = document.getElementById("player");

function generateRingtone() {
  const name = document.getElementById("nameInput").value.trim();
  const status = document.getElementById("status");

  if (!name) {
    alert("Naam likho!");
    return;
  }

  const text = name + " ji, phone utha lo... koi call kar raha hai";

  audioURL = "https://api.streamelements.com/kappa/v2/speech?voice=Brian&text=" + encodeURIComponent(text);

  player.src = audioURL;

  status.innerText = "▶ Play button dabao aur ringtone suno";

}

function downloadRingtone() {
  if (!audioURL) {
    alert("Pehle generate karo!");
    return;
  }

  const a = document.createElement("a");
  a.href = audioURL;
  a.download = "ringtone.mp3";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

</script>

</body>
</html>
