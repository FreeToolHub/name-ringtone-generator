<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Name Ringtone Generator | Pro Tool</title>
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --dark: #1e1b4b;
            --light: #f8fafc;
            --success: #22c55e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        h1 { margin-bottom: 1rem; color: var(--dark); }
        
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 10px;
        }

        .btn-generate { background: var(--primary); color: white; }
        .btn-generate:disabled { background: #ccc; }
        
        .result-area { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        
        .ad-slot { background: #f8fafc; border: 1px dashed #cbd5e1; margin: 15px 0; display: flex; align-items: center; justify-content: center; color: #94a3b8; font-size: 12px; }
        .ad-top { height: 90px; width: 100%; }
        .ad-sticky { position: fixed; bottom: 0; width: 100%; height: 50px; background: #fff; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

    <div class="ad-slot ad-top">ADVERTISEMENT - TOP BANNER</div>

    <div class="container">
        <h1>Ringtone Maker</h1>
        <input type="text" id="userName" placeholder="Enter your name..." maxlength="25">
        
        <button id="generateBtn" class="btn btn-generate">Generate Ringtone</button>

        <div id="resultArea" class="result-area">
            <p id="statusMsg" style="margin-bottom: 15px; font-weight: bold; color: var(--primary);"></p>
            <button id="playBtn" class="btn" style="background: var(--dark); color: white;">▶ Play</button>
            <button id="downloadBtn" class="btn" style="background: var(--success); color: white;">↓ Download Ringtone</button>
        </div>
    </div>

    <div class="ad-sticky">ADVERTISEMENT - STICKY FOOTER</div>

    <script>
        const generateBtn = document.getElementById('generateBtn');
        const resultArea = document.getElementById('resultArea');
        const statusMsg = document.getElementById('statusMsg');
        const userName = document.getElementById('userName');
        
        let finalBlob = null;
        const BG_URL = 'https://files.catbox.moe/66alqw.mp3';

        generateBtn.onclick = async () => {
            const name = userName.value.trim();
            if (!name) return alert("Please enter a name");

            generateBtn.disabled = true;
            generateBtn.innerText = "Processing Audio...";
            
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // 1. Load Background Music
                const bgBuffer = await fetch(BG_URL).then(r => r.arrayBuffer()).then(data => audioCtx.decodeAudioData(data));

                // 2. Setup Speech
                const msg = new SpeechSynthesisUtterance(`${name}, someone is calling you please pick up the phone`);
                const voices = window.speechSynthesis.getVoices();
                msg.voice = voices.find(v => v.lang.includes('en-IN')) || voices[0];
                msg.rate = 0.9;

                // 3. Create a Destination for recording
                const dest = audioCtx.createMediaStreamDestination();
                const recorder = new MediaRecorder(dest.stream);
                const chunks = [];

                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = () => {
                    finalBlob = new Blob(chunks, { type: 'audio/mp3' });
                    statusMsg.innerText = "Ringtone Ready!";
                    resultArea.style.display = 'block';
                    generateBtn.disabled = false;
                    generateBtn.innerText = "Generate Ringtone";
                };

                // 4. Connect background music and start recording
                const bgSource = audioCtx.createBufferSource();
                bgSource.buffer = bgBuffer;
                const gain = audioCtx.createGain();
                gain.gain.value = 0.3; // Background volume lower
                
                bgSource.connect(gain);
                gain.connect(dest);
                gain.connect(audioCtx.destination); // So user hears it too

                recorder.start();
                bgSource.start(0);
                window.speechSynthesis.speak(msg);

                // Stop recording when speech ends
                msg.onend = () => {
                    setTimeout(() => {
                        bgSource.stop();
                        recorder.stop();
                    }, 1000); // 1 sec padding
                };

            } catch (err) {
                console.error(err);
                alert("Generation failed. Please use Chrome on Desktop or Android.");
                generateBtn.disabled = false;
                generateBtn.innerText = "Generate Ringtone";
            }
        };

        document.getElementById('playBtn').onclick = () => {
            if (finalBlob) new Audio(URL.createObjectURL(finalBlob)).play();
        };

        document.getElementById('downloadBtn').onclick = () => {
            if (finalBlob) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(finalBlob);
                a.download = `${userName.value}_Ringtone.mp3`;
                a.click();
            }
        };

        // Initialize voices
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
